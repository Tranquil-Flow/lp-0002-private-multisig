[scaffold]
version = "0.2.0"

# Keep cache local to this project when LOGOS_SCAFFOLD_CACHE_ROOT is not set.
# Relative paths resolve from this scaffold.toml directory.
cache_root = ".scaffold/cache"

[repos.lez]
source = "https://github.com/logos-blockchain/logos-execution-zone.git"
pin = "35d8df0d031315219f94d1546ceb862b0e5b208f"

[repos.spel]
source = "https://github.com/logos-co/spel.git"
path = ".scaffold/cache/repos/spel/ed3bbedb4b684645da05455d30a4a0be7cc4dfe0"
pin = "ed3bbedb4b684645da05455d30a4a0be7cc4dfe0"

[repos.basecamp]
source = "https://github.com/logos-co/logos-basecamp"
pin = "a746cdbc521f72ee22c5a4856fd17a9802bb9d69"
build = "nix-flake"
attr = "app"

[wallet]
home_dir = ".scaffold/wallet"

[framework]
kind = "default"
version = "0.1.0"

[framework.idl]
spec = "lssa-idl/0.1.0"
path = "interfaces"

[localnet]
port = 3040
risc0_dev_mode = false

[basecamp]
port_base = 60200
port_stride = 10

[modules.lp0002_private_multisig]
flake = "path:.#lgx"
role = "project"
